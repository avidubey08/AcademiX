<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AcademiX - Student Dashboard</title>
  <style>
    /* NEW: CSS Variables for our dynamic progress bars */
    :root {
      --good-color: #2ecc71;    /* Green for > 75% */
      --warning-color: #f1c40f; /* Yellow for 60% - 75% */
      --danger-color: #e74c3c;  /* Red for < 60% */
    }

    body {
      margin: 0; padding: 0;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(145deg, #14324a, #2d6a8d 48%, #5dd39e);
      min-height: 100vh;
      color: #f8fafc;
    }
    
    header {
      background: rgba(255, 255, 255, 0.12);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      border-bottom: 1px solid rgba(255, 255, 255, 0.2);
      color: #fff;
      padding: 20px; display: flex;
      justify-content: space-between; align-items: center;
    }
    
    header h1 { margin: 0; font-size: 1.5em; color: white;}
    header span { color: #f1f5f9; }
    
    button.logout-btn {
      background: rgba(231, 76, 60, 0.82); color: #fff;
      border: 1px solid rgba(255, 255, 255, 0.24);
      padding: 10px 15px; border-radius: 5px;
      cursor: pointer; font-weight: bold;
    }
    button.logout-btn:hover { background: #c0392b; }
    
    .container {
      max-width: 900px; margin: 30px auto;
      padding: 0 20px;
    }
    
    .card {
      background: rgba(255, 255, 255, 0.14);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.22);
      border-radius: 8px;
      padding: 20px; 
      box-shadow: 0 12px 32px rgba(10, 20, 35, 0.26);
      margin-bottom: 25px; /* Added spacing between cards */
    }
    
    .card h2 { 
      margin-top: 0; 
      color: #f8fafc; 
      border-bottom: 2px solid rgba(255, 255, 255, 0.22); 
      padding-bottom: 10px; 
    }

    /* NEW: Styling for the Stats Grid */
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 15px;
      margin-top: 15px;
    }

    .stat-card {
      background: rgba(255, 255, 255, 0.08);
      padding: 15px;
      border-radius: 8px;
      border: 1px solid rgba(255, 255, 255, 0.15);
      text-align: center;
    }

    .stat-card h3 { margin: 0 0 10px 0; color: #fff; font-size: 1.2em; }
    .stat-card p { margin: 0; font-size: 1.8em; text-shadow: 1px 1px 2px rgba(0,0,0,0.3); }
    .stat-card small { color: #cbd5e1; display: block; margin-bottom: 8px; }
    
    /* Table Styling */
    table {
      width: 100%; border-collapse: collapse; margin-top: 15px;
      background: rgba(255, 255, 255, 0.08);
      border-radius: 8px;
      overflow: hidden;
    }
    table th, table td {
      padding: 12px 15px; text-align: left; border-bottom: 1px solid rgba(255, 255, 255, 0.18);
    }
    table th {
      background-color: rgba(17, 24, 39, 0.45); color: #f8fafc;
    }
    table tr:hover { background-color: rgba(255, 255, 255, 0.12); }
    
    .status {
      padding: 10px; border-radius: 4px; background: rgba(0, 188, 124, 0.22); color: #dcfce7;
      margin-bottom: 15px; text-align: center;
    }

    .empty-state {
      text-align: center; padding: 30px; color: #dbeafe; font-style: italic;
    }
  </style>
</head>
<body>

 <header style="display: flex; justify-content: space-between; align-items: center; padding: 15px 30px; background: rgba(255, 255, 255, 0.08); backdrop-filter: blur(14px); border-bottom: 1px solid rgba(255, 255, 255, 0.15);">
    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 350 80" width="220" height="50">
      <defs>
        <linearGradient id="academixGrad" x1="0%" y1="0%" x2="100%" y2="100%">
          <stop offset="0%" stop-color="#5dd39e" /><stop offset="100%" stop-color="#2d6a8d" />
        </linearGradient>
      </defs>
      <path d="M 35 15 L 15 15 L 15 65 L 35 65" fill="none" stroke="url(#academixGrad)" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" />
      <path d="M 65 15 L 85 15 L 85 65 L 65 65" fill="none" stroke="url(#academixGrad)" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" />
      <path d="M 50 25 L 25 38 L 50 51 L 75 38 Z" fill="url(#academixGrad)" />
      <path d="M 32 42 L 32 55 C 32 60, 68 60, 68 55 L 68 42" fill="none" stroke="#f8fafc" stroke-width="3" />
      <circle cx="50" cy="51" r="2.5" fill="#fff" />
      <text x="110" y="48" font-family="'Segoe UI', Tahoma, sans-serif" font-size="32" font-weight="800" fill="#ffffff">Academi</text>
      <text x="245" y="48" font-family="'Segoe UI', Tahoma, sans-serif" font-size="32" font-weight="900" fill="url(#academixGrad)">X</text>
      <text x="112" y="68" font-family="'Segoe UI', Tahoma, sans-serif" font-size="11" font-weight="600" fill="#cbd5e1" letter-spacing="2">AI ATTENDANCE</text>
    </svg>

    <div style="display: flex; align-items: center; gap: 20px;">
      <span style="font-size: 1.1em; font-weight: 500; color: #e2e8f0;">Student Dashboard <span id="student-name" style="font-weight: 700; color: #fff;"></span></span>
      <button class="logout-btn" onclick="logout()">Logout</button>
    </div>
  </header>
  <div class="container">
    
    <div class="card">
      <h2>Overall Attendance Stats</h2>
      <div id="attendance-stats-container" class="stats-grid">
        <div class="empty-state">Calculating statistics...</div>
      </div>
    </div>

    <div class="card">
      <h2>Recent Attendance History</h2>
      <div id="loading" class="status">Loading data...</div>
      
      <table id="attendance-table" style="display: none;">
        <thead>
          <tr>
            <th>Date & Time</th>
            <th>Subject</th>
            <th>Professor</th>
          </tr>
        </thead>
        <tbody id="attendance-body">
          </tbody>
      </table>
      <div id="empty-state" class="empty-state" style="display: none;">
        No attendance records found yet.
      </div>
    </div>

  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script src="../js/auth.js"></script>
  <script src="../js/student.js"></script>
</body>
</html>
