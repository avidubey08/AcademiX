<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AcademiX - Forgot Password</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #6e8efb, #a777e3);
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .glass-container {
      background: rgba(255, 255, 255, 0.15);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border-radius: 20px;
      border: 1px solid rgba(255, 255, 255, 0.3);
      box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.37);
      padding: 40px;
      width: 350px;
      text-align: center;
      color: #fff;
    }

    .glass-container h2 {
      margin-top: 0;
      margin-bottom: 5px;
      font-weight: 600;
      letter-spacing: 1px;
    }
    
    .glass-container p {
      font-size: 0.9em;
      margin-bottom: 20px;
      color: rgba(255, 255, 255, 0.8);
    }

    .input-group {
      margin-bottom: 20px;
      text-align: left;
    }

    .input-group label {
      display: block;
      margin-bottom: 8px;
      font-size: 0.9em;
    }

    .input-group input {
      width: 100%;
      padding: 10px;
      border: none;
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.2);
      color: #fff;
      font-size: 1em;
      outline: none;
      box-sizing: border-box;
      backdrop-filter: blur(5px);
      -webkit-backdrop-filter: blur(5px);
    }

    .input-group input::placeholder {
      color: rgba(255, 255, 255, 0.7);
    }

    button {
      width: 100%;
      padding: 12px;
      border: none;
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.3);
      color: #fff;
      font-size: 1.1em;
      font-weight: bold;
      cursor: pointer;
      transition: background 0.3s ease;
      box-sizing: border-box;
    }

    button:hover {
      background: rgba(255, 255, 255, 0.5);
    }

    .message {
      margin-bottom: 15px;
      font-size: 0.9em;
      min-height: 20px;
      display: none;
      padding: 10px;
      border-radius: 5px;
    }
    .message.error {
      background-color: rgba(255, 0, 0, 0.2);
      border: 1px solid rgba(255, 0, 0, 0.4);
    }
    .message.success {
      background-color: rgba(0, 255, 0, 0.2);
      border: 1px solid rgba(0, 255, 0, 0.4);
    }

    a.back-link {
      display: inline-block;
      margin-top: 15px;
      color: #fff;
      text-decoration: none;
      font-size: 0.9em;
      opacity: 0.8;
      transition: opacity 0.3s;
    }
    a.back-link:hover {
      opacity: 1;
      text-decoration: underline;
    }
  </style>
</head>
<body>

  <div class="glass-container">
    <h2>Recover Password</h2>
    <p>Reset your AcademiX password</p>
    
    <div id="status-message" class="message"></div>
    
    <!-- Step 1: Request OTP -->
    <form id="request-form">
      <div class="input-group">
        <label for="email">Email Address</label>
        <input type="email" id="email" placeholder="Enter your registered email" required>
      </div>
      <button type="submit">Send Reset OTP</button>
    </form>

    <!-- Step 2: Verify OTP & Reset (Hidden initially) -->
    <form id="reset-form" style="display: none;">
      <div class="input-group">
        <label for="otp">Enter OTP</label>
        <input type="text" id="otp" placeholder="6-digit code" required>
      </div>
      <div class="input-group">
        <label for="new-password">New Password</label>
        <input type="password" id="new-password" placeholder="Enter new password" required>
      </div>
      <button type="submit">Complete Reset</button>
    </form>

    <a href="login.html" class="back-link">&larr; Back to Login</a>
  </div>

  <script src="../js/forgot-password.js"></script>
</body>
</html>
